<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Studio - Create with Your OS</title>
    
    <!-- Figtree Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0A0A0A;
            --accent-purple: #7B61FF;
            --accent-purple-light: #9B85FF;
            --accent-pink: #E066FF;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-muted: #666666;
            --border: #1A1A1A;
        }
        
        body {
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.5;
        }
        
        /* Aurora Background Animation */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .aurora {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: 
                radial-gradient(ellipse 80% 50% at 50% 30%, rgba(123, 97, 255, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 70% 60%, rgba(224, 102, 255, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse 50% 30% at 30% 70%, rgba(123, 97, 255, 0.15) 0%, transparent 40%);
            animation: aurora-move 20s ease-in-out infinite;
            filter: blur(60px);
        }
        
        @keyframes aurora-move {
            0%, 100% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            33% {
                transform: translate(-48%, -52%) rotate(5deg) scale(1.05);
            }
            66% {
                transform: translate(-52%, -48%) rotate(-5deg) scale(0.95);
            }
        }
        
        /* Noise Texture Overlay */
        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 20px;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: transparent;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .nav-links {
            display: flex;
            gap: 40px;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .nav-links a:hover {
            color: var(--text-primary);
        }
        
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .nav-cta a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        
        .btn-primary {
            background: var(--accent-purple);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            background: var(--accent-purple-light);
            transform: translateY(-2px);
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 80px;
            z-index: 2;
        }
        
        /* Tag */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(123, 97, 255, 0.1);
            border: 1px solid rgba(123, 97, 255, 0.2);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-purple-light);
            margin-bottom: 32px;
        }
        
        .tag-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-pink);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Hero Title */
        .hero-title {
            font-size: clamp(48px, 8vw, 80px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            max-width: 900px;
        }
        
        .hero-title .gradient {
            background: linear-gradient(135deg, #FFFFFF 0%, var(--accent-purple-light) 50%, var(--accent-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Hero Subtitle */
        .hero-subtitle {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        /* Hero Buttons */
        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn-large {
            padding: 16px 32px;
            font-size: 16px;
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }
        
        /* Social Proof */
        .social-proof {
            margin-top: 80px;
            text-align: center;
        }
        
        .social-proof-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        
        .avatars {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        
        .avatar-group {
            display: flex;
        }
        
        .avatar-group img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            margin-left: -10px;
        }
        
        .avatar-group img:first-child {
            margin-left: 0;
        }
        
        .avatar-count {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-left: -10px;
        }
        
        .social-proof-stats {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .social-proof-stats strong {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 12px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 16px 20px;
            }
            
            .nav-links {
                display: none;
            }
            
            .hero {
                padding: 100px 20px 60px;
            }
            
            .hero-title {
                font-size: 40px;
            }
            
            .hero-subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Aurora Background -->
    <div class="hero-bg">
        <div class="aurora"></div>
        <div class="noise"></div>
    </div>
    
    <!-- Navigation -->
    <nav>
        <a href="#" class="logo">
            <div class="logo-icon">
                <img src="https://cyanhuang01.github.io/imaclaw-website/logo.png" alt="IMA Logo" style="width: 36px; height: 36px; object-fit: contain;">
            </div>
            IMA Studio
        </a>
        
        <div class="nav-links">
            <a href="#">Services</a>
            <a href="#">Process</a>
            <a href="#">Cases</a>
            <a href="#">Pricing</a>
        </div>
        
        <div class="nav-cta">
            <a href="#">Sign In</a>
            <a href="#" class="btn-primary">Start Creating</a>
        </div>
    </nav>
    
    <!-- Hero Section -->
    <section class="hero">
        <div class="tag">
            <span class="tag-dot"></span>
            iMaclaw Beta Now Available
        </div>
        
        <div class="hero-logo">
            <img src="https://cyanhuang01.github.io/imaclaw-website/logo.png" alt="IMA" style="max-width: 400px; width: 80vw; height: auto;">
        </div>
        
        <div class="hero-buttons">
            <a href="#" class="btn-primary btn-large">
                Start Creating Free
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"></path>
                </svg>
            </a>
            
            <a href="#" class="btn-secondary">
                Explore Skills
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"></path>
                </svg>
            </a>
        </div>
        
        <div class="social-proof">
            <p class="social-proof-text">Over 2,000+ creators trust us</p>
            
            <div class="avatars">
                <div class="avatar-group">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=1&backgroundColor=b6e3f4" alt="">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=2&backgroundColor=c0aede" alt="">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=3&backgroundColor=ffd5dc" alt="">
                    <div class="avatar-count">+2k</div>
                </div>
                <span class="social-proof-stats"><strong>2,000+</strong> creators joined</span>
            </div>
        </div>
    </section>
</body>
</html>
